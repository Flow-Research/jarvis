[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jarvis-protocol"
version = "0.1.0a0"
description = "Python protocol helper package for Jarvis v0.1 records."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["jarvis", "protocol", "human-agent", "conformance"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Libraries"
]

[tool.jarvis]
package-status = "Protocol Alpha helper tooling"
protocol-version = "v0.1"
openapi-version = "0.1.0"
fixture-set = "v0.1"

[tool.hatch.build.targets.wheel]
packages = ["src/jarvis_protocol"]
force-include = { "fixtures/v0.1" = "jarvis_protocol/fixtures/v0.1" }

[tool.hatch.build.targets.sdist]
include = [
  "README.md",
  "pyproject.toml",
  "src/jarvis_protocol",
  "fixtures/v0.1"
]
