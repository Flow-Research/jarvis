openapi: 3.1.1
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Jarvis Human-Agent Collaboration Protocol
  summary: Human-agent collaboration and learning-loop protocol.
  description: |
    Jarvis defines the protocol records and operations for governed
    collaboration between HumanWorkers and AgentWorkers.

    Jarvis does not define runtime execution, UI, authentication
    provider, storage, model calls, isolation behavior, cloud deployment, billing,
    task routing, or marketplace logic.
  version: 0.1.0
servers:
  - url: https://jarvis.example.invalid
    description: OpenAPI placeholder only. Jarvis does not operate this server; compatible hosts publish their own URLs.
security:
  - HostAuth: []
tags:
  - name: Workers
    description: Worker and Actor protocol reference operations.
  - name: WorkSessions
    description: WorkSession lifecycle and event operations.
  - name: ControlPlane
    description: PolicyDecision, Request, Review, and Takeover operations.
  - name: Attribution
    description: Contribution operations.
  - name: Learning
    description: LearningRecord, MemoryProposal, and SkillProposal operations.
  - name: Evidence
    description: EvidenceManifest export operations.
  - name: Feedback
    description: OutcomeReport operations.
  - name: Conformance
    description: Compatibility and conformance entry operations.
paths: {}
components:
  schemas:
    JarvisId:
      type: string
      minLength: 1
      maxLength: 160
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      description: Portable Jarvis protocol identifier. Host-private database ids stay outside protocol records.
    OpaqueRef:
      type: string
      minLength: 1
      maxLength: 512
      description: Opaque protocol or external reference. Receivers do not need host-private infrastructure knowledge to preserve it.
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp.
    NamespacedExtensions:
      type: object
      description: Namespaced extension fields. Extensions MUST NOT override core fields or contain forbidden host-private data.
      propertyNames:
        type: string
        pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|cookie|api_key|access_key|auth_header|oauth|database|billing|runtime|container|deployment|model_api_key|raw_prompt|host_account|ui_state))[a-z0-9][a-z0-9-]*(\\.[a-z0-9_-]+)+$"
      additionalProperties:
        $ref: "#/components/schemas/PortableValue"
    PortableValue:
      description: Portable JSON value. Protocol records MUST NOT use this field to carry credentials, host-private ids, raw runtime state, billing data, or UI state.
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: "null"
        - type: array
          items:
            $ref: "#/components/schemas/PortableValue"
        - type: object
          propertyNames:
            type: string
            pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|cookie|api_key|access_key|auth_header|oauth|database|billing|runtime|container|deployment|model_api_key|raw_prompt|host_account|ui_state))[a-z0-9][a-z0-9._:-]*$"
          additionalProperties:
            $ref: "#/components/schemas/PortableValue"
    WorkerType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
    ActorType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
    ContributionRole:
      type: string
      enum:
        - human
        - agent
        - shared
        - service
        - tool
    AutonomyLevel:
      type: string
      enum:
        - observe_only
        - propose_only
        - execute_with_review
        - bounded_execute
        - full_execute_in_scope
    WorkSessionStatus:
      type: string
      enum:
        - created
        - active
        - waiting_on_human
        - takeover
        - reconciling
        - completed
        - failed
        - cancelled
        - closed
    PolicyDecisionResult:
      type: string
      enum:
        - allow
        - deny
        - narrow
        - review_required
    RiskClass:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
    DataSensitivity:
      type: string
      enum:
        - public
        - private
        - confidential
        - restricted
    AuthorityScope:
      type: object
      additionalProperties: false
      required:
        - grants
      properties:
        grants:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    AccountabilityScope:
      type: object
      additionalProperties: false
      required:
        - accountable_for
      properties:
        accountable_for:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    CapabilityRef:
      type: object
      additionalProperties: false
      required:
        - ref
      properties:
        ref:
          $ref: "#/components/schemas/OpaqueRef"
        capability_type:
          type: string
          minLength: 1
        required:
          type: boolean
          default: false
    EventAuthority:
      type: object
      additionalProperties: false
      required:
        - can_append_events
      properties:
        can_append_events:
          type: boolean
        allowed_event_types:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    ContributionScope:
      type: object
      additionalProperties: false
      required:
        - contribution_roles
      properties:
        contribution_roles:
          type: array
          items:
            $ref: "#/components/schemas/ContributionRole"
          minItems: 1
          uniqueItems: true
    CanonicalizationProfile:
      type: object
      additionalProperties: false
      required:
        - serialization
        - hash_method
      properties:
        serialization:
          type: string
          minLength: 1
        hash_method:
          type: string
          minLength: 1
        profile_ref:
          $ref: "#/components/schemas/OpaqueRef"
    ProtocolTraceContext:
      type: object
      additionalProperties: false
      properties:
        trace_id:
          $ref: "#/components/schemas/OpaqueRef"
        parent_event_id:
          $ref: "#/components/schemas/JarvisId"
        correlation_ref:
          $ref: "#/components/schemas/OpaqueRef"
    JarvisEventPayload:
      type: object
      additionalProperties: false
      required:
        - object_type
        - action
      properties:
        object_type:
          type: string
          enum:
            - worker
            - actor
            - human_worker
            - agent_worker
            - work_session
            - jarvis_event
            - policy
            - policy_decision
            - request
            - review
            - takeover
            - contribution
            - evidence_manifest
            - learning_record
            - memory_proposal
            - skill_proposal
            - outcome_report
            - protocol_error
            - conformance_result
        object_id:
          $ref: "#/components/schemas/JarvisId"
        action:
          type: string
          minLength: 1
        field_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        evidence_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        summary:
          type: string
          minLength: 1
    PolicyConstraint:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          type: string
          minLength: 1
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        value_ref:
          $ref: "#/components/schemas/OpaqueRef"
        max_count:
          type: integer
          minimum: 0
        unit:
          type: string
          minLength: 1
        reason:
          type: string
          minLength: 1
    EscalationRule:
      type: object
      additionalProperties: false
      required:
        - trigger
        - required_action
      properties:
        trigger:
          type: string
          minLength: 1
        risk_class:
          $ref: "#/components/schemas/RiskClass"
        required_action:
          type: string
          enum:
            - create_request
            - require_review
            - start_takeover
            - deny_action
        reviewer_ref:
          $ref: "#/components/schemas/OpaqueRef"
        reason:
          type: string
          minLength: 1
    PolicyActionRule:
      type: object
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          minLength: 1
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        grant_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        constraints:
          type: array
          items:
            $ref: "#/components/schemas/PolicyConstraint"
    PolicyRequestLimits:
      type: object
      additionalProperties: false
      properties:
        max_pending_requests:
          type: integer
          minimum: 0
        max_repeated_denials:
          type: integer
          minimum: 0
        default_expiry_seconds:
          type: integer
          minimum: 1
    PolicyActionRequest:
      type: object
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          minLength: 1
        target_ref:
          $ref: "#/components/schemas/OpaqueRef"
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        input_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        parameter_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
    Worker:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - role
        - authority_scope
        - accountability_scope
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        type:
          $ref: "#/components/schemas/WorkerType"
        role:
          type: string
          minLength: 1
        authority_scope:
          $ref: "#/components/schemas/AuthorityScope"
        accountability_scope:
          $ref: "#/components/schemas/AccountabilityScope"
        display_name:
          type: string
          minLength: 1
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityRef"
          uniqueItems: true
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
      x-jarvis-forbidden-fields:
        - password
        - credential
        - raw_auth_token
        - billing_account
        - provider_secret
        - database_primary_key
        - deployment_resource_id
    Actor:
      type: object
      additionalProperties: false
      required:
        - id
        - worker_id
        - type
        - event_authority
        - contribution_scope
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        worker_id:
          $ref: "#/components/schemas/JarvisId"
        type:
          $ref: "#/components/schemas/ActorType"
        event_authority:
          $ref: "#/components/schemas/EventAuthority"
        contribution_scope:
          $ref: "#/components/schemas/ContributionScope"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
        valid_from:
          $ref: "#/components/schemas/Timestamp"
        valid_until:
          $ref: "#/components/schemas/Timestamp"
      x-jarvis-forbidden-fields:
        - credential
        - raw_auth_token
        - session_cookie
        - private_key
        - database_primary_key
    HumanWorker:
      type: object
      additionalProperties: false
      required:
        - worker_id
        - actor_id
        - role
        - policy_authority
        - review_authority
      properties:
        worker_id:
          $ref: "#/components/schemas/JarvisId"
        actor_id:
          $ref: "#/components/schemas/JarvisId"
        role:
          type: string
          minLength: 1
        policy_authority:
          $ref: "#/components/schemas/AuthorityScope"
        review_authority:
          $ref: "#/components/schemas/AuthorityScope"
        profile_ref:
          $ref: "#/components/schemas/OpaqueRef"
        domain_context_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        preferences:
          type: object
          description: Portable human preference hints. Preferences MUST NOT contain private profile data, account state, credentials, billing data, or UI state.
          propertyNames:
            type: string
            pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|cookie|api_key|access_key|auth_header|oauth|database|billing|runtime|container|deployment|model_api_key|raw_prompt|host_account|ui_state))[a-z0-9][a-z0-9._:-]*$"
          additionalProperties:
            $ref: "#/components/schemas/PortableValue"
        boundaries:
          type: array
          items:
            type: string
            minLength: 1
        known_patterns:
          type: array
          items:
            type: string
            minLength: 1
      x-jarvis-forbidden-fields:
        - password
        - credential
        - raw_auth_token
        - private_profile_data
        - billing_account
        - host_account_record
    AgentWorker:
      type: object
      additionalProperties: false
      required:
        - worker_id
        - actor_id
        - agent_ref
        - role
        - capability_refs
        - autonomy_level
        - operating_constraints
      properties:
        worker_id:
          $ref: "#/components/schemas/JarvisId"
        actor_id:
          $ref: "#/components/schemas/JarvisId"
        agent_ref:
          $ref: "#/components/schemas/OpaqueRef"
        role:
          type: string
          minLength: 1
        capability_refs:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityRef"
          minItems: 1
        autonomy_level:
          $ref: "#/components/schemas/AutonomyLevel"
        operating_constraints:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        tool_access_profile:
          $ref: "#/components/schemas/OpaqueRef"
        memory_access_profile:
          $ref: "#/components/schemas/OpaqueRef"
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
      x-jarvis-forbidden-fields:
        - model_api_key
        - provider_secret
        - raw_prompt_store
        - runtime_process_id
        - container_id
        - database_primary_key
    WorkSession:
      type: object
      additionalProperties: false
      required:
        - id
        - protocol_version
        - created_by_actor_id
        - objective
        - human_worker_id
        - agent_worker_id
        - policy_id
        - status
        - revision
        - last_event_hash
        - event_log_ref
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        protocol_version:
          type: string
          const: v0.1
        created_by_actor_id:
          $ref: "#/components/schemas/JarvisId"
        objective:
          type: string
          minLength: 1
        human_worker_id:
          $ref: "#/components/schemas/JarvisId"
        agent_worker_id:
          $ref: "#/components/schemas/JarvisId"
        policy_id:
          $ref: "#/components/schemas/JarvisId"
        status:
          $ref: "#/components/schemas/WorkSessionStatus"
        revision:
          type: integer
          minimum: 0
        last_event_hash:
          type: string
          minLength: 1
        event_log_ref:
          $ref: "#/components/schemas/OpaqueRef"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
        source_ref:
          $ref: "#/components/schemas/OpaqueRef"
        context_manifest_ref:
          $ref: "#/components/schemas/OpaqueRef"
        contribution_ledger_ref:
          $ref: "#/components/schemas/OpaqueRef"
        evidence_manifest_ref:
          $ref: "#/components/schemas/OpaqueRef"
        learning_record_refs:
          type: array
          items:
            $ref: "#/components/schemas/JarvisId"
          uniqueItems: true
      x-jarvis-forbidden-fields:
        - database_primary_key
        - queue_message_id
        - runtime_session_id
        - cloud_resource_id
        - ui_state
        - credential
        - raw_auth_token
    JarvisEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - sequence
        - type
        - work_session_id
        - actor_id
        - timestamp
        - payload
        - previous_hash
        - event_hash
        - canonicalization
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        sequence:
          type: integer
          minimum: 0
        type:
          type: string
          minLength: 1
        work_session_id:
          $ref: "#/components/schemas/JarvisId"
        actor_id:
          $ref: "#/components/schemas/JarvisId"
        timestamp:
          $ref: "#/components/schemas/Timestamp"
        payload:
          $ref: "#/components/schemas/JarvisEventPayload"
        previous_hash:
          type: string
          minLength: 1
        event_hash:
          type: string
          minLength: 1
        canonicalization:
          $ref: "#/components/schemas/CanonicalizationProfile"
        trace_context:
          $ref: "#/components/schemas/ProtocolTraceContext"
        actor_signature:
          type: string
          minLength: 1
        signing_key_ref:
          $ref: "#/components/schemas/OpaqueRef"
      x-jarvis-forbidden-fields:
        - raw_auth_token
        - credential
        - private_key
        - database_primary_key
        - runtime_trace_secret
        - provider_secret
    Policy:
      type: object
      additionalProperties: false
      required:
        - id
        - owner_worker_id
        - created_by_actor_id
        - autonomy_level
        - allowed_actions
        - denied_actions
        - review_required_actions
        - risk_classes
        - escalation_rules
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        owner_worker_id:
          $ref: "#/components/schemas/JarvisId"
        created_by_actor_id:
          $ref: "#/components/schemas/JarvisId"
        autonomy_level:
          $ref: "#/components/schemas/AutonomyLevel"
        allowed_actions:
          type: array
          items:
            $ref: "#/components/schemas/PolicyActionRule"
        denied_actions:
          type: array
          items:
            $ref: "#/components/schemas/PolicyActionRule"
        review_required_actions:
          type: array
          items:
            $ref: "#/components/schemas/PolicyActionRule"
        risk_classes:
          type: array
          items:
            $ref: "#/components/schemas/RiskClass"
          minItems: 1
          uniqueItems: true
        escalation_rules:
          type: array
          items:
            $ref: "#/components/schemas/EscalationRule"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        tool_grants:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        memory_grants:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        external_send_rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyActionRule"
        request_limits:
          $ref: "#/components/schemas/PolicyRequestLimits"
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
      x-jarvis-forbidden-fields:
        - credential
        - raw_auth_token
        - provider_secret
        - billing_rule
        - cloud_policy_id
        - database_primary_key
    PolicyDecision:
      type: object
      additionalProperties: false
      allOf:
        - if:
            properties:
              result:
                const: deny
          then:
            required:
              - request_id
        - if:
            properties:
              result:
                const: review_required
          then:
            required:
              - request_id
      required:
        - id
        - work_session_id
        - actor_id
        - policy_id
        - requested_action
        - normalized_action_hash
        - risk_class
        - result
        - reason
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        work_session_id:
          $ref: "#/components/schemas/JarvisId"
        actor_id:
          $ref: "#/components/schemas/JarvisId"
        policy_id:
          $ref: "#/components/schemas/JarvisId"
        requested_action:
          $ref: "#/components/schemas/PolicyActionRequest"
        normalized_action_hash:
          type: string
          minLength: 1
        risk_class:
          $ref: "#/components/schemas/RiskClass"
        result:
          $ref: "#/components/schemas/PolicyDecisionResult"
        reason:
          type: string
          minLength: 1
        created_at:
          $ref: "#/components/schemas/Timestamp"
        data_sensitivity:
          $ref: "#/components/schemas/DataSensitivity"
        selected_grant_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        denied_grant_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        request_id:
          $ref: "#/components/schemas/JarvisId"
        evidence_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
      x-jarvis-forbidden-fields:
        - hidden_policy_trace
        - credential
        - provider_secret
        - database_primary_key
        - runtime_decision_object
  parameters: {}
  headers: {}
  requestBodies: {}
  responses: {}
  securitySchemes:
    HostAuth:
      type: http
      scheme: bearer
      description: Host-owned caller authentication. Jarvis requires caller authentication for protocol operations and does not issue credentials.
  examples: {}
x-jarvis-protocol:
  version: v0.1
  layer: OpenAPI 3.1 communication binding
  source_of_truth:
    - docs/protocol/14-protocol-lock.md
    - docs/protocol/15-openapi-communication-binding.md
    - docs/protocol/11-core-protocol-objects.md
    - docs/protocol/12-request-protocol.md
    - docs/protocol/13-contribution-evidence-learning.md
    - docs/reviews/acceptance-criteria.md
  owns:
    - protocol objects
    - protocol operations
    - protocol headers
    - protocol error envelope
    - portable export boundary
    - conformance entry
  outside_jarvis:
    - runtime execution
    - UI
    - authentication provider
    - authorization backend
    - storage
    - queues
    - cloud provider
    - sandbox implementation
    - model provider
    - tool execution
    - billing
    - deployment
    - task marketplace
    - host workflow
  chunk_lock:
    id: week-2-chunk-3-worksession-policy-schemas
    locks:
      - OpenAPI 3.1.1 entry point
      - v0.1 protocol metadata
      - required top-level buckets
      - tag taxonomy
      - host-owned server boundary
      - shared schema primitives
      - Worker schema
      - Actor schema
      - HumanWorker schema
      - AgentWorker schema
      - WorkSession schema
      - JarvisEvent schema
      - Policy schema
      - PolicyDecision schema
    excludes:
      - path operation bodies
      - operation-specific security requirements
      - control-plane schemas
      - evidence and learning schemas
      - examples
      - conformance fixtures
