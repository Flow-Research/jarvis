openapi: 3.1.1
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Jarvis Human-Agent Collaboration Protocol
  summary: Human-agent collaboration and learning-loop protocol.
  description: |
    Jarvis defines the protocol records and operations for governed
    collaboration between HumanWorkers and AgentWorkers.

    Jarvis does not define runtime execution, product UI, authentication
    provider, storage, model calls, sandbox behavior, cloud deployment, billing,
    task routing, or marketplace logic.
  version: 0.1.0
servers:
  - url: https://jarvis.example.invalid
    description: OpenAPI placeholder only. Jarvis does not operate this server; compatible hosts publish their own URLs.
security:
  - HostAuth: []
tags:
  - name: Workers
    description: Worker and Actor protocol reference operations.
  - name: WorkSessions
    description: WorkSession lifecycle and event operations.
  - name: ControlPlane
    description: PolicyDecision, Request, Review, and Takeover operations.
  - name: Attribution
    description: Contribution operations.
  - name: Learning
    description: LearningRecord, MemoryProposal, and SkillProposal operations.
  - name: Evidence
    description: EvidenceManifest export operations.
  - name: Feedback
    description: OutcomeReport operations.
  - name: Conformance
    description: Compatibility and conformance entry operations.
paths: {}
components:
  schemas:
    JarvisId:
      type: string
      minLength: 1
      maxLength: 160
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      description: Portable Jarvis protocol identifier. Host-private database ids stay outside protocol records.
    OpaqueRef:
      type: string
      minLength: 1
      maxLength: 512
      description: Opaque protocol or external reference. Receivers do not need host-private infrastructure knowledge to preserve it.
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp.
    NamespacedExtensions:
      type: object
      description: Namespaced extension fields. Extensions MUST NOT override core fields or contain forbidden host-private data.
      propertyNames:
        type: string
        pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|database|billing|runtime|container|deployment|model_api_key|raw_prompt|product_account|ui_state))[a-z0-9][a-z0-9-]*(\\.[a-z0-9_-]+)+$"
      additionalProperties:
        $ref: "#/components/schemas/PortableValue"
    PortableValue:
      description: Portable JSON value. Protocol records MUST NOT use this field to carry credentials, host-private ids, raw runtime state, billing data, or product UI state.
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: "null"
        - type: array
          items:
            $ref: "#/components/schemas/PortableValue"
        - type: object
          propertyNames:
            type: string
            pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|database|billing|runtime|container|deployment|model_api_key|raw_prompt|product_account|ui_state))[a-z0-9][a-z0-9._:-]*$"
          additionalProperties:
            $ref: "#/components/schemas/PortableValue"
    WorkerType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
    ActorType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
    ContributionRole:
      type: string
      enum:
        - human
        - agent
        - shared
        - service
        - tool
    AutonomyLevel:
      type: string
      enum:
        - observe_only
        - propose_only
        - execute_with_review
        - bounded_execute
        - full_execute_in_scope
    AuthorityScope:
      type: object
      additionalProperties: false
      required:
        - grants
      properties:
        grants:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    AccountabilityScope:
      type: object
      additionalProperties: false
      required:
        - accountable_for
      properties:
        accountable_for:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    CapabilityRef:
      type: object
      additionalProperties: false
      required:
        - ref
      properties:
        ref:
          $ref: "#/components/schemas/OpaqueRef"
        capability_type:
          type: string
          minLength: 1
        required:
          type: boolean
          default: false
    EventAuthority:
      type: object
      additionalProperties: false
      required:
        - can_append_events
      properties:
        can_append_events:
          type: boolean
        allowed_event_types:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    ContributionScope:
      type: object
      additionalProperties: false
      required:
        - contribution_roles
      properties:
        contribution_roles:
          type: array
          items:
            $ref: "#/components/schemas/ContributionRole"
          minItems: 1
          uniqueItems: true
    Worker:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - role
        - authority_scope
        - accountability_scope
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        type:
          $ref: "#/components/schemas/WorkerType"
        role:
          type: string
          minLength: 1
        authority_scope:
          $ref: "#/components/schemas/AuthorityScope"
        accountability_scope:
          $ref: "#/components/schemas/AccountabilityScope"
        display_name:
          type: string
          minLength: 1
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityRef"
          uniqueItems: true
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
      x-jarvis-forbidden-fields:
        - password
        - credential
        - raw_auth_token
        - billing_account
        - provider_secret
        - database_primary_key
        - deployment_resource_id
    Actor:
      type: object
      additionalProperties: false
      required:
        - id
        - worker_id
        - type
        - event_authority
        - contribution_scope
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        worker_id:
          $ref: "#/components/schemas/JarvisId"
        type:
          $ref: "#/components/schemas/ActorType"
        event_authority:
          $ref: "#/components/schemas/EventAuthority"
        contribution_scope:
          $ref: "#/components/schemas/ContributionScope"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
        valid_from:
          $ref: "#/components/schemas/Timestamp"
        valid_until:
          $ref: "#/components/schemas/Timestamp"
      x-jarvis-forbidden-fields:
        - credential
        - raw_auth_token
        - session_cookie
        - private_key
        - database_primary_key
    HumanWorker:
      type: object
      additionalProperties: false
      required:
        - worker_id
        - actor_id
        - role
        - policy_authority
        - review_authority
      properties:
        worker_id:
          $ref: "#/components/schemas/JarvisId"
        actor_id:
          $ref: "#/components/schemas/JarvisId"
        role:
          type: string
          minLength: 1
        policy_authority:
          $ref: "#/components/schemas/AuthorityScope"
        review_authority:
          $ref: "#/components/schemas/AuthorityScope"
        profile_ref:
          $ref: "#/components/schemas/OpaqueRef"
        domain_context_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        preferences:
          type: object
          description: Portable human preference hints. Preferences MUST NOT contain private profile data, account state, credentials, billing data, or product UI state.
          propertyNames:
            type: string
            pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|database|billing|runtime|container|deployment|model_api_key|raw_prompt|product_account|ui_state))[a-z0-9][a-z0-9._:-]*$"
          additionalProperties:
            $ref: "#/components/schemas/PortableValue"
        boundaries:
          type: array
          items:
            type: string
            minLength: 1
        known_patterns:
          type: array
          items:
            type: string
            minLength: 1
      x-jarvis-forbidden-fields:
        - password
        - credential
        - raw_auth_token
        - private_profile_data
        - billing_account
        - product_account_record
    AgentWorker:
      type: object
      additionalProperties: false
      required:
        - worker_id
        - actor_id
        - agent_ref
        - role
        - capability_refs
        - autonomy_level
        - operating_constraints
      properties:
        worker_id:
          $ref: "#/components/schemas/JarvisId"
        actor_id:
          $ref: "#/components/schemas/JarvisId"
        agent_ref:
          $ref: "#/components/schemas/OpaqueRef"
        role:
          type: string
          minLength: 1
        capability_refs:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityRef"
          minItems: 1
        autonomy_level:
          $ref: "#/components/schemas/AutonomyLevel"
        operating_constraints:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        tool_access_profile:
          $ref: "#/components/schemas/OpaqueRef"
        memory_access_profile:
          $ref: "#/components/schemas/OpaqueRef"
        extensions:
          $ref: "#/components/schemas/NamespacedExtensions"
      x-jarvis-forbidden-fields:
        - model_api_key
        - provider_secret
        - raw_prompt_store
        - runtime_process_id
        - container_id
        - database_primary_key
  parameters: {}
  headers: {}
  requestBodies: {}
  responses: {}
  securitySchemes:
    HostAuth:
      type: http
      scheme: bearer
      description: Host-owned caller authentication. Jarvis requires caller authentication for protocol operations and does not issue credentials.
  examples: {}
x-jarvis-protocol:
  version: v0.1
  layer: OpenAPI 3.1 communication binding
  source_of_truth:
    - docs/protocol/14-protocol-lock.md
    - docs/protocol/15-openapi-communication-binding.md
    - docs/protocol/11-core-protocol-objects.md
    - docs/protocol/12-request-protocol.md
    - docs/protocol/13-contribution-evidence-learning.md
    - docs/reviews/acceptance-criteria.md
  owns:
    - protocol objects
    - protocol operations
    - protocol headers
    - protocol error envelope
    - portable export boundary
    - conformance entry
  outside_jarvis:
    - runtime execution
    - product UI
    - authentication provider
    - authorization backend
    - database
    - queues
    - cloud provider
    - sandbox implementation
    - model provider
    - tool execution
    - billing
    - deployment
    - task marketplace
    - product workflow
  chunk_lock:
    id: week-2-chunk-2-participant-schemas
    locks:
      - OpenAPI 3.1.1 entry point
      - v0.1 protocol metadata
      - required top-level buckets
      - tag taxonomy
      - host-owned server boundary
      - shared schema primitives
      - Worker schema
      - Actor schema
      - HumanWorker schema
      - AgentWorker schema
    excludes:
      - path operation bodies
      - operation-specific security requirements
      - WorkSession schema
      - control-plane schemas
      - evidence and learning schemas
      - examples
      - conformance fixtures
