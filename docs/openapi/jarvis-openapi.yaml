openapi: 3.1.1
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Jarvis Human-Agent Collaboration Protocol
  summary: Human-agent collaboration and learning-loop protocol.
  description: |
    Jarvis defines the protocol records and operations for governed
    collaboration between HumanWorkers and AgentWorkers.

    Jarvis does not define runtime execution, UI, authentication
    provider, storage, model calls, isolation behavior, cloud deployment, billing,
    task routing, or marketplace logic.
  version: 0.1.0
servers:
  - url: https://jarvis.example.invalid
    description: OpenAPI placeholder only. Jarvis does not operate this server; compatible hosts publish their own URLs.
security:
  - HostAuth: []
tags:
  - name: Workers
    description: Worker and Actor protocol reference operations.
  - name: WorkSessions
    description: WorkSession lifecycle and event operations.
  - name: ControlPlane
    description: PolicyDecision, Request, Review, and Takeover operations.
  - name: Attribution
    description: Contribution operations.
  - name: Learning
    description: LearningRecord, MemoryProposal, and SkillProposal operations.
  - name: Evidence
    description: EvidenceManifest export operations.
  - name: Feedback
    description: OutcomeReport operations.
  - name: Conformance
    description: Compatibility and conformance entry operations.
paths:
  /workers/{worker_id}:
    put:
      operationId: registerWorker
      tags:
        - Workers
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkerIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
      requestBody:
        $ref: "#/components/requestBodies/WorkerBody"
      responses:
        "200":
          $ref: "#/components/responses/WorkerResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /actors/{actor_id}:
    put:
      operationId: registerActor
      tags:
        - Workers
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
      requestBody:
        $ref: "#/components/requestBodies/ActorBody"
      responses:
        "200":
          $ref: "#/components/responses/ActorResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions:
    post:
      operationId: createWorkSession
      tags:
        - WorkSessions
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/WorkSessionBody"
      responses:
        "201":
          $ref: "#/components/responses/WorkSessionResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}:
    get:
      operationId: getWorkSession
      tags:
        - WorkSessions
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
      responses:
        "200":
          $ref: "#/components/responses/WorkSessionResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/events:
    post:
      operationId: appendJarvisEvent
      tags:
        - WorkSessions
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/JarvisEventBody"
      responses:
        "201":
          $ref: "#/components/responses/JarvisEventResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/policy-decisions:
    post:
      operationId: recordPolicyDecision
      tags:
        - ControlPlane
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/PolicyDecisionBody"
      responses:
        "201":
          $ref: "#/components/responses/PolicyDecisionResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/requests:
    post:
      operationId: createRequest
      tags:
        - ControlPlane
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RequestBody"
      responses:
        "201":
          $ref: "#/components/responses/RequestResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/reviews:
    post:
      operationId: recordReview
      tags:
        - ControlPlane
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ReviewBody"
      responses:
        "201":
          $ref: "#/components/responses/ReviewResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/takeovers:
    post:
      operationId: recordTakeover
      tags:
        - ControlPlane
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/TakeoverBody"
      responses:
        "201":
          $ref: "#/components/responses/TakeoverResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/contributions:
    post:
      operationId: recordContribution
      tags:
        - Attribution
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ContributionBody"
      responses:
        "201":
          $ref: "#/components/responses/ContributionResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/learning-records:
    post:
      operationId: createLearningRecord
      tags:
        - Learning
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/LearningRecordBody"
      responses:
        "201":
          $ref: "#/components/responses/LearningRecordResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/memory-proposals:
    post:
      operationId: createMemoryProposal
      tags:
        - Learning
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/MemoryProposalBody"
      responses:
        "201":
          $ref: "#/components/responses/MemoryProposalResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/skill-proposals:
    post:
      operationId: createSkillProposal
      tags:
        - Learning
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
        - $ref: "#/components/parameters/RevisionHeader"
        - $ref: "#/components/parameters/PreviousHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SkillProposalBody"
      responses:
        "201":
          $ref: "#/components/responses/SkillProposalResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /work-sessions/{work_session_id}/export:
    get:
      operationId: exportEvidenceManifest
      tags:
        - Evidence
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkSessionIdPath"
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
      responses:
        "200":
          $ref: "#/components/responses/EvidenceManifestResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
  /outcome-reports:
    post:
      operationId: submitOutcomeReport
      tags:
        - Feedback
      security:
        - HostAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersionHeader"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
        - $ref: "#/components/parameters/RequestTimestampHeader"
      requestBody:
        $ref: "#/components/requestBodies/OutcomeReportBody"
      responses:
        "202":
          $ref: "#/components/responses/OutcomeReportResponse"
        "400":
          $ref: "#/components/responses/ProtocolErrorResponse"
components:
  schemas:
    JarvisId:
      type: string
      minLength: 1
      maxLength: 160
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      description: Portable Jarvis protocol identifier. Host-private database ids stay outside protocol records.
    OpaqueRef:
      type: string
      minLength: 1
      maxLength: 512
      description: Opaque protocol or external reference. Receivers do not need host-private infrastructure knowledge to preserve it.
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp.
    NamespacedExtensions:
      type: object
      description: Namespaced extension fields. Extensions MUST NOT override core fields or contain forbidden host-private data.
      propertyNames:
        type: string
        pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|cookie|api_key|access_key|auth_header|oauth|database|billing|runtime|container|deployment|model_api_key|raw_prompt|host_account|ui_state))[a-z0-9][a-z0-9-]*(\\.[a-z0-9_-]+)+$"
      additionalProperties:
        $ref: "#/components/schemas/PortableValue"
    PortableValue:
      description: Portable JSON value. Protocol records MUST NOT use this field to carry credentials, host-private ids, raw runtime state, billing data, or UI state.
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: "null"
        - type: array
          items:
            $ref: "#/components/schemas/PortableValue"
        - type: object
          propertyNames:
            type: string
            pattern: "^(?!.*(password|credential|token|secret|private_key|session_cookie|cookie|api_key|access_key|auth_header|oauth|database|billing|runtime|container|deployment|model_api_key|raw_prompt|host_account|ui_state))[a-z0-9][a-z0-9._:-]*$"
          additionalProperties:
            $ref: "#/components/schemas/PortableValue"
    WorkerType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
    ActorType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
    ContributionRole:
      type: string
      enum:
        - human
        - agent
        - shared
        - service
        - tool
    AutonomyLevel:
      type: string
      enum:
        - observe_only
        - propose_only
        - execute_with_review
        - bounded_execute
        - full_execute_in_scope
    WorkSessionStatus:
      type: string
      enum:
        - created
        - active
        - waiting_on_human
        - takeover
        - reconciling
        - completed
        - failed
        - cancelled
        - closed
    PolicyDecisionResult:
      type: string
      enum:
        - allow
        - deny
        - narrow
        - review_required
    RiskClass:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
    DataSensitivity:
      type: string
      enum:
        - public
        - private
        - confidential
        - restricted
    RequestType:
      type: string
      enum:
        - permission
        - context
        - judgment
        - review
        - correction
        - takeover
        - escalation
    RequestStatus:
      type: string
      enum:
        - pending
        - acknowledged
        - approved
        - denied
        - narrowed
        - answered
        - needs_revision
        - takeover
        - expired
        - cancelled
        - superseded
    BlockingScope:
      type: string
      enum:
        - action
        - branch
        - artifact
        - tool_call
        - external_send
        - final_submission
        - work_session
    ReviewDecision:
      type: string
      enum:
        - approve
        - deny
        - narrow
        - correct
        - takeover
        - needs_revision
    TakeoverState:
      type: string
      enum:
        - requested
        - locked
        - human_active
        - reconciliation_required
        - resumed
        - closed
    ContributorType:
      type: string
      enum:
        - human
        - agent
        - service
        - tool
        - shared
    ContributionType:
      type: string
      enum:
        - intent
        - instruction
        - plan
        - research
        - execution
        - artifact
        - review
        - correction
        - decision
        - evidence_capture
        - memory_proposal
        - skill_proposal
        - submission
    LearningSubjectType:
      type: string
      enum:
        - human
        - agent
        - pair
    LearningReviewState:
      type: string
      enum:
        - proposed
        - accepted
        - rejected
        - superseded
    ProposalTargetType:
      type: string
      enum:
        - human
        - agent
        - pair
        - project
        - task
    MemoryProposalStatus:
      type: string
      enum:
        - proposed
        - pending_review
        - accepted
        - rejected
        - superseded
        - expired
    SkillProposalStatus:
      type: string
      enum:
        - proposed
        - pending_review
        - accepted
        - rejected
        - superseded
        - archived
    ProtocolErrorId:
      type: string
      enum:
        - invalid_transition
        - unknown_state
        - missing_protocol_version
        - unsupported_protocol_version
        - missing_request_timestamp
        - stale_request_timestamp
        - missing_expected_work_session_revision
        - missing_previous_event_hash
        - stale_work_session_revision
        - missing_idempotency_key
        - missing_actor
        - invalid_extension_namespace
        - extension_core_field_override
        - missing_policy
        - missing_policy_decision
        - missing_objective
        - policy_denied
        - request_unresolved
        - review_required
        - invalid_request_transition
        - missing_review_resolution
        - missing_takeover_resolution
        - invalid_approval_scope
        - approval_scope_expired
        - approval_scope_mismatch
        - stale_takeover_epoch
        - invalid_event_hash
        - invalid_previous_event_hash
        - duplicate_idempotency_key_mismatch
        - request_livelock
        - duplicate_request_mismatch
        - missing_jarvis_event
        - missing_blocked_scope_resolution_refs
        - missing_reconciliation_refs
        - mutation_after_closed
        - unauthorized_actor
        - invalid_export
        - invalid_export_state
        - invalid_evidence_export_state
        - missing_contribution_actor
        - invalid_contributor_refs
        - shared_contribution_without_individual_refs
        - evidence_after_the_fact
        - missing_evidence_event_refs
        - forbidden_export_field
        - silent_memory_mutation
        - silent_skill_activation
        - model_self_confirmed_memory
        - tool_self_confirmed_memory
        - skill_expands_tool_access_without_policy_review
        - sealed_work_session_mutation
        - sealed_evidence_mutation
        - outcome_report_without_learning_record
        - unsupported_capability
        - forbidden_host_private_field
    AuthorityScope:
      type: object
      additionalProperties: false
      required:
        - grants
      properties:
        grants:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    AccountabilityScope:
      type: object
      additionalProperties: false
      required:
        - accountable_for
      properties:
        accountable_for:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    CapabilityRef:
      type: object
      additionalProperties: false
      required:
        - ref
      properties:
        ref:
          $ref: "#/components/schemas/OpaqueRef"
        capability_type:
          type: string
          minLength: 1
        required:
          type: boolean
          default: false
    EventAuthority:
      type: object
      additionalProperties: false
      required:
        - can_append_events
      properties:
        can_append_events:
          type: boolean
        allowed_event_types:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
    ContributionScope:
      type: object
      additionalProperties: false
      required:
        - contribution_roles
      properties:
        contribution_roles:
          type: array
          items:
            $ref: "#/components/schemas/ContributionRole"
          minItems: 1
          uniqueItems: true
    CanonicalizationProfile:
      type: object
      additionalProperties: false
      required:
        - serialization
        - hash_method
      properties:
        serialization:
          type: string
          minLength: 1
        hash_method:
          type: string
          minLength: 1
        profile_ref:
          $ref: "#/components/schemas/OpaqueRef"
    ProtocolTraceContext:
      type: object
      additionalProperties: false
      properties:
        trace_id:
          $ref: "#/components/schemas/OpaqueRef"
        parent_event_id:
          $ref: "#/components/schemas/JarvisId"
        correlation_ref:
          $ref: "#/components/schemas/OpaqueRef"
    JarvisEventPayload:
      type: object
      additionalProperties: false
      required:
        - object_type
        - action
      properties:
        object_type:
          type: string
          enum:
            - worker
            - actor
            - human_worker
            - agent_worker
            - work_session
            - jarvis_event
            - policy
            - policy_decision
            - request
            - review
            - takeover
            - contribution
            - evidence_manifest
            - learning_record
            - memory_proposal
            - skill_proposal
            - outcome_report
            - protocol_error
            - conformance_result
        object_id:
          $ref: "#/components/schemas/JarvisId"
        action:
          type: string
          minLength: 1
        field_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        evidence_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        summary:
          type: string
          minLength: 1
    PolicyConstraint:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          type: string
          minLength: 1
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        value_ref:
          $ref: "#/components/schemas/OpaqueRef"
        max_count:
          type: integer
          minimum: 0
        unit:
          type: string
          minLength: 1
        reason:
          type: string
          minLength: 1
    EscalationRule:
      type: object
      additionalProperties: false
      required:
        - trigger
        - required_action
      properties:
        trigger:
          type: string
          minLength: 1
        risk_class:
          $ref: "#/components/schemas/RiskClass"
        required_action:
          type: string
          enum:
            - create_request
            - require_review
            - start_takeover
            - deny_action
        reviewer_ref:
          $ref: "#/components/schemas/OpaqueRef"
        reason:
          type: string
          minLength: 1
    PolicyActionRule:
      type: object
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          minLength: 1
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        grant_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        constraints:
          type: array
          items:
            $ref: "#/components/schemas/PolicyConstraint"
    PolicyRequestLimits:
      type: object
      additionalProperties: false
      properties:
        max_pending_requests:
          type: integer
          minimum: 0
        max_repeated_denials:
          type: integer
          minimum: 0
        default_expiry_seconds:
          type: integer
          minimum: 1
    PolicyActionRequest:
      type: object
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          minLength: 1
        target_ref:
          $ref: "#/components/schemas/OpaqueRef"
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        input_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
        parameter_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
          uniqueItems: true
    RequestOption:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - effect
      properties:
        id:
          $ref: "#/components/schemas/JarvisId"
        label:
          type: string
          minLength: 1
        effect:
          type: string
          minLength: 1
        risk_class:
          $ref: "#/components/schemas/RiskClass"
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
    SafeFallback:
      type: object
      additionalProperties: false
      required:
        - action
        - reason
      properties:
        action:
          type: string
          enum:
            - continue_unrelated_safe_work
            - continue_with_limited_evidence
            - cancel_blocked_scope
            - keep_blocked_scope_stopped
        reason:
          type: string
          minLength: 1
        limitation_ref:
          $ref: "#/components/schemas/OpaqueRef"
    ApprovalBoundary:
      type: object
      additionalProperties: false
      required:
        - scope_ref
      properties:
        scope_ref:
          $ref: "#/components/schemas/OpaqueRef"
        grant_refs:
          type: array
          items:
            $ref: "#/components/schemas/OpaqueRef"
